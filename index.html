<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f5f7fa;color:#1a2332}
.shell{max-width:960px;margin:0 auto;padding:28px 24px}
.lang-toggle{position:fixed;top:16px;right:20px;z-index:1000;display:flex;gap:2px;background:#e2e8f0;border-radius:20px;padding:3px}
.lang-btn{border:none;background:transparent;font-size:12px;font-weight:700;padding:5px 12px;border-radius:16px;cursor:pointer;color:#64748b;transition:.15s;letter-spacing:.5px}
.lang-btn.active{background:#0057b7;color:#fff;box-shadow:0 1px 4px rgba(0,87,183,.3)}
h1{font-size:22px;font-weight:700;color:#0a1628;line-height:1.25;margin-bottom:4px}
.subtitle{font-size:13px;color:#64748b;margin-bottom:24px}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:24px}
.kpi{background:#fff;border:1px solid #e2e8f0;border-radius:10px;padding:14px 16px;border-top:3px solid #0057b7}
.kpi-label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:.6px;margin-bottom:6px;font-weight:600}
.kpi-val{font-size:26px;font-weight:700;color:#0a1628;line-height:1}
.kpi-sub{font-size:11px;color:#94a3b8;margin-top:3px}
.section{background:#fff;border:1px solid #e2e8f0;border-radius:12px;padding:20px 22px;margin-bottom:20px}
.section-title{font-size:14px;font-weight:700;color:#0a1628;margin-bottom:4px}
.section-desc{font-size:12px;color:#64748b;margin-bottom:16px}
#map-svg{width:100%;display:block}
.legend{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:11px;color:#64748b}
.legend-bar{display:flex;height:10px;border-radius:3px;overflow:hidden;flex:1;max-width:200px}
.toggle-row{display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap}
.toggle-btn{font-size:12px;padding:5px 14px;border-radius:20px;border:1.5px solid #e2e8f0;background:#fff;color:#64748b;cursor:pointer;transition:.15s;font-weight:600}
.toggle-btn.active{background:#0057b7;border-color:#0057b7;color:#fff}
.tooltip{position:fixed;pointer-events:none;background:#0a1628;color:#fff;padding:8px 12px;border-radius:7px;font-size:12px;font-weight:600;display:none;z-index:999;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.25)}
.chart-wrap{position:relative;width:100%;height:280px}
.conf-box{margin-top:32px;padding:16px 20px;border:1.5px solid #e2e8f0;border-left:4px solid #0057b7;border-radius:8px;background:#f8fafc}
.conf-box p{font-size:12px;color:#475569;line-height:1.7;margin:0}
</style>

const UA_M = ['Січ','Лют','Бер','Квіт','Трав','Черв','Лип','Серп','Вер','Жовт','Лист','Груд'];
const MONTHS_UA = MONTHS_EN.map(s => { const [y,m]=s.split('-'); return UA_M[+m-1]+' '+y; });

// ── Translations ──────────────────────────────────────────────────────────────
const T = {
  en: {
    h1:        'Geography and Growth of Returned Children and Youth in Ukraine',
    subtitle:  'Children &lt;18 and youth 18–23 returned from temporarily occupied territories and Russia · Combined dataset · Data as of 4 May 2025',
    kpi1l:'Total returned',      kpi1s:'children & youth',
    kpi2l:'Regions reached',     kpi2s:'of 25 oblasts + Kyiv',
    kpi3l:'Under 18',            kpi3s:'children',
    kpi4l:'Youth 18–23',    kpi4s:'young adults',
    mapTitle:'Geography of Returned Children and Youth in Ukraine',
    mapDesc: 'Share of returned children and youth by region of residence · darker = higher share',
    legLow:'Lower share',  legHigh:'Higher share',
    timeTitle:'Growth in the Number of Returned Children and Youth',
    timeDesc: 'Monthly returns (bars) and cumulative total (line) · Feb 2022 – Apr 2026',
    btnCum:'Cumulative',   btnMon:'Monthly',   btnSpl:'Children vs youth',
    confTitle:'CONFIDENTIAL',
    confText: 'This document contains confidential information intended solely for the use of the individual or entity to whom it has been addressed. If you have received this in error, you are strictly prohibited from using, copying, distributing, or disclosing any of its contents. The information presented herein may not be reproduced, shared, or used for any purpose other than the review for which it was provided.',
    ttWord:'returned',
    lCum:'Cumulative returns', lMon:'Monthly returns', lC18:'Children <18', lY23:'Youth 18–23',
    months: MONTHS_EN
  },
  ua: {
    h1:        'Географія та динаміка повернення дітей і молоді в Україні',
    subtitle:  'Діти до 18 років та молодь 18–23 роки, повернуті з ТОТ та Росії · Зведені дані · Станом на 4 травня 2025 року',
    kpi1l:'Всього повернуто', kpi1s:'дітей та молоді',
    kpi2l:'Охоплено регіонів', kpi2s:'з 25 областей + м. Київ',
    kpi3l:'До 18 років',    kpi3s:'діти',
    kpi4l:'Молодь 18–23',   kpi4s:'молоді дорослі',
    mapTitle:'Географія повернення дітей і молоді в Україні',
    mapDesc: 'Частка повернутих дітей і молоді за регіоном проживання · темніший = більша частка',
    legLow:'Менша частка', legHigh:'Більша частка',
    timeTitle:'Динаміка зростання кількості повернутих дітей і молоді',
    timeDesc: 'Щомісячні повернення (стовпчики) та накопичувальна кількість (лінія) · лют. 2022 – квіт. 2026',
    btnCum:'Накопичувально', btnMon:'По місяцях', btnSpl:'Діти та молодь',
    confTitle:'КОНФІДЕНЦІЙНО',
    confText: 'Цей документ містить конфіденційну інформацію, призначену виключно для використання особою або організацією, якій вона була надіслана. Якщо ви отримали її помилково, вам суворо заборонено використовувати, копіювати, поширювати або розкривати будь-які його матеріали. Інформація не може бути відтворена, передана або використана для будь-яких цілей, окрім ознайомлення тими, кому вона була направлена.',
    ttWord:'Повернуто',
    lCum:'Накопичувальна кількість', lMon:'Щомісячні повернення', lC18:'Діти до 18', lY23:'Молодь 18–23',
    months: MONTHS_UA
  }
};

// ── State ─────────────────────────────────────────────────────────────────────
let lang = 'en';
let view = 'cumulative';
let chart = null;

// ── Apply translations ────────────────────────────────────────────────────────
function applyLang() {
  const t = T[lang];
  const ids = ['h1','subtitle','kpi1l','kpi1s','kpi2l','kpi2s','kpi3l','kpi3s','kpi4l','kpi4s',
    'mapTitle','mapDesc','legLow','legHigh','timeTitle','timeDesc','confTitle','confText'];
  ids.forEach(id => {
    const el = document.getElementById('t-' + id);
    if (el) el.innerHTML = t[id];
  });
  document.getElementById('btn-cum').textContent = t.btnCum;
  document.getElementById('btn-mon').textContent = t.btnMon;
  document.getElementById('btn-spl').textContent = t.btnSpl;
  buildChart(view);
}

function setLang(l, btn) {
  lang = l;
  document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  applyLang();
}

// ── Chart ─────────────────────────────────────────────────────────────────────
const CHART_OPTS = (stacked) => ({
  responsive: true, maintainAspectRatio: false,
  plugins: { legend: { display: stacked, labels: { color:'#475569', font:{ size:11 } } } },
  scales: {
    x: { ticks: { maxTicksLimit:12, color:'#94a3b8', font:{ size:10 } }, grid: { color:'#f1f5f9' } },
    y: { ticks: { color:'#94a3b8', font:{ size:10 } }, grid: { color:'#f1f5f9' }, stacked }
  }
});

function buildChart(v) {
  view = v;
  if (chart) chart.destroy();
  const ctx = document.getElementById('timeChart').getContext('2d');
  const t   = T[lang];
  const months = t.months;

  if (v === 'cumulative') {
    chart = new Chart(ctx, {
      type: 'line',
      data: { labels: months, datasets: [{ label: t.lCum, data: CUMUL,
        borderColor:'#0057b7', backgroundColor:'rgba(0,87,183,.1)',
        fill:true, tension:.35, pointRadius:0, pointHoverRadius:4, borderWidth:2.5 }] },
      options: CHART_OPTS(false)
    });
  } else if (v === 'monthly') {
    const total = MONTHS_EN.map((_,i) => CNT_C[i]+CNT_A[i]);
    chart = new Chart(ctx, {
      type: 'bar',
      data: { labels: months, datasets: [{ label: t.lMon, data: total,
        backgroundColor:'#3b82f6', borderRadius:3 }] },
      options: CHART_OPTS(false)
    });
  } else {
    chart = new Chart(ctx, {
      type: 'bar',
      data: { labels: months, datasets: [
        { label: t.lC18, data: CNT_C, backgroundColor:'#3b82f6', borderRadius:2, stack:'s' },
        { label: t.lY23, data: CNT_A, backgroundColor:'#ffd700', borderRadius:2, stack:'s' }
      ]},
      options: CHART_OPTS(true)
    });
  }
}

function setView(v, btn) {
  document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildChart(v);
}

// ── Map ───────────────────────────────────────────────────────────────────────
const colorScale = d3.scaleSequential()
  .domain([0, Math.max(...Object.values(REGION_DATA))])
  .interpolator(d3.interpolate('#dbeafe','#1e3a8a'));

const svg = d3.select('#map-container').append('svg').attr('viewBox','0 0 880 440').attr('width','100%');
const proj = d3.geoMercator().fitSize([880,440], GEOJSON);
const path = d3.geoPath(proj);
const tip  = document.getElementById('tooltip');

svg.selectAll('path')
  .data(GEOJSON.features)
  .join('path')
  .attr('d', path)
  .attr('fill', d => {
    const v = REGION_DATA[d.properties.ADMIN_1] || 0;
    return v ? colorScale(v) : '#f1f5f9';
  })
  .attr('stroke','#fff').attr('stroke-width','0.8').attr('stroke-linejoin','round')
  .style('cursor','pointer')
  .on('mousemove', function(event, d) {
    const name  = d.properties.ADMIN_1;
    const val   = REGION_DATA[name] || 0;
    const share = val ? ((val/TOTAL)*100).toFixed(1) : '—';
    const word  = T[lang].ttWord;
    d3.select(this).attr('stroke','#0057b7').attr('stroke-width','2');
    tip.style.display = 'block';
    tip.style.left = (event.clientX+14)+'px';
    tip.style.top  = (event.clientY-14)+'px';
    tip.innerHTML  = `<span style="color:#94a3b8;font-weight:400">${name}</span><br>${word}: ${val} (${share}%)`;
  })
  .on('mouseleave', function() {
    d3.select(this).attr('stroke','#fff').attr('stroke-width','0.8');
    tip.style.display = 'none';
  });

// Legend bar
const lb = document.getElementById('legend-bar');
['#dbeafe','#93c5fd','#60a5fa','#3b82f6','#2563eb','#1d4ed8','#1e3a8a'].forEach(c => {
  const s = document.createElement('span');
  s.style.background = c; s.style.flex = '1';
  lb.appendChild(s);
});

// ── Init ─────────────────────────────────────────────────────────────────────
applyLang();
</script>
